version: "3.8"

services:
  # Node.js + Express backend service running SQLite
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queuemaster-backend
    restart: always
    ports:
      - "5000:5000" # Expose backend port for easy API testing/debugging
    volumes:
      - sqlite-data:/app # Persist the SQLite database across container restarts
    environment:
      - PORT=5000
      - NODE_ENV=production

  # React + Vite static frontend served via Nginx reverse proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: queuemaster-frontend
    restart: always
    ports:
      - "8080:80" # Run the web application at http://localhost:8080
    depends_on:
      - backend

# Docker volumes for state preservation
volumes:
  sqlite-data:
